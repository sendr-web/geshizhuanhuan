<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B3 Prototype - 交互闭环升级版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* 隐藏滚动条以获得更逼真的 App 体验 */
    ::-webkit-scrollbar {
      display: none;
    }
    
    /* 扫光动画 */
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ChevronDown, 
      ChevronRight, 
      MapPin, 
      Mic, 
      List, 
      Wand2, 
      PlusCircle, 
      Network,
      AlignLeft,
      Search,
      Lightbulb,
      Layers,
      Sparkles,
      Zap,
      X,
      Download
    } from 'lucide-react';

    function B3Prototype() {
      // 状态机：'initial' (正常阅读) | 'trigger' (AI面板态) | 'mindmap' (半屏脑图态) | 'reading' (沉浸阅读态)
      const [uiState, setUiState] = useState('initial');
      const [activeNode, setActiveNode] = useState(null);
      const [highlightedSection, setHighlightedSection] = useState(null);
      
      const documentRef = useRef(null);

      // 模拟文档数据
      const articleContent = [
        {
          id: 'intro',
          title: '前言：数字时代的文化新生',
          content: '在数字化浪潮的推动下，传统文化正在经历一场前所未有的变革。这不仅是技术的革新，更是文化表达方式的重塑。通过数字技术，我们能够打破物理空间的限制，让文化遗产以全新的面貌呈现在大众面前。'
        },
        {
          id: 'node-1',
          title: '一、核心论点：文化与科技的深度融合',
          content: '当前，文化产业的核心驱动力已经从单一的内容创作转向了“内容+科技”的双轮驱动。科技不仅提升了文化产品的生产效率，更从根本上改变了文化的消费模式和体验方式。这种深度融合是不可逆转的趋势。'
        },
        {
          id: 'node-2',
          title: '二、文化创意转化：从抽象到具象',
          content: '文化创意转化的关键在于将抽象的文化符号转化为具象的、可交互的数字资产。这一过程需要跨界人才的参与，包括历史学家、艺术家以及程序员。通过提取传统文化的核心元素，结合现代审美进行再创作，使其焕发新的生命力。'
        },
        {
          id: 'node-3',
          title: '三、沉浸式技术应用：打破虚拟与现实的边界',
          content: '沉浸式技术（如VR、AR、MR）在文化创意转化中扮演着至关重要的角色。它使得观众不再是旁观者，而是参与者。通过空间计算和实时渲染技术，我们可以复原历史场景，让用户“走进”画卷，与历史人物“对话”。这种身临其境的体验极大地增强了文化传播的感染力和穿透力，是未来文化展示的标配。',
          isTarget: true
        },
        {
          id: 'conclusion',
          title: '结语：展望未来的文化元宇宙',
          content: '随着Web3.0和元宇宙概念的落地，文化产业将迎来更大的想象空间。每一个文化IP都可以构建自己的数字生态，实现价值的无限延展。这需要我们保持开放的心态和持续创新的精神。'
        },
        {
          id: 'padding',
          title: '',
          content: '（此处为模拟占位文本，用于增加页面滚动长度。在实际产品中，文章内容可能会很长，用户需要不断向下滑动阅读。）'
        },
        {
          id: 'padding-2',
          title: '',
          content: '（底部占位空间，确保平滑滚动时目标段落可以滚动到视觉中心位置。）'
        }
      ];

      // 状态二：点击脑图节点，触发状态三（沉浸阅读态）
      const handleNodeClick = (nodeId, breadcrumbText) => {
        setActiveNode(breadcrumbText);
        setUiState('reading');
        
        // 平滑滚动与高亮逻辑
        setTimeout(() => {
          const element = document.getElementById(nodeId);
          if (element) {
            // 使用 behavior: 'smooth' 实现300ms平滑滚动
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // 触发高亮闪烁
            setHighlightedSection(nodeId);
            setTimeout(() => {
              setHighlightedSection(null);
            }, 1500); // 高亮持续1.5秒后淡出
          }
        }, 50); // 微小延迟确保DOM准备就绪
      };

      return (
        <div className="flex justify-center items-center min-h-screen bg-gray-100 p-4 font-sans text-gray-800">
          {/* 手机模拟外壳 */}
          <div className="relative w-full max-w-[400px] h-[800px] bg-white rounded-[40px] shadow-2xl overflow-hidden border-[8px] border-gray-900">
            
            {/* 顶部状态栏 (模拟) */}
            <div className="absolute top-0 left-0 right-0 h-12 flex justify-between items-center px-6 z-50 pointer-events-none">
              <span className="text-sm font-semibold tracking-wider">9:41</span>
              <div className="flex gap-1.5">
                <div className="w-4 h-3 bg-black rounded-sm"></div>
                <div className="w-3 h-3 bg-black rounded-full"></div>
                <div className="w-5 h-3 bg-black rounded-sm"></div>
              </div>
            </div>

            {/* --- 组件：底层文档流 (Document View) --- */}
            {/* 当抽屉升起时，底部增加 padding 以模拟被往上推的效果 */}
            <div 
              ref={documentRef}
              className={`absolute inset-0 pt-16 px-5 overflow-y-auto transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] ${
                (uiState === 'trigger' || uiState === 'mindmap') ? 'pb-[65vh] bg-gray-50/50 scale-[0.98] origin-top' : 'pb-24 bg-white scale-100'
              }`}
            >
              <h1 className="text-2xl font-bold mb-6 text-gray-900">文化产业发展洞察报告</h1>
              <div className="space-y-8">
                {articleContent.map((section) => (
                  <div 
                    key={section.id} 
                    id={section.id}
                    className={`transition-colors duration-700 rounded-lg ${
                      highlightedSection === section.id ? 'bg-yellow-100 ring-4 ring-yellow-100' : 'bg-transparent'
                    }`}
                  >
                    {section.title && <h2 className="text-lg font-bold mb-2 text-gray-800">{section.title}</h2>}
                    <p className="text-[15px] leading-relaxed text-gray-600">
                      {section.content}
                    </p>
                  </div>
                ))}
              </div>
            </div>

            {/* 右下角浮动按钮 (触发AI面板) */}
            {uiState === 'initial' && (
              <button 
                onClick={() => setUiState('trigger')}
                className="absolute bottom-8 right-6 w-14 h-14 bg-black text-white rounded-full shadow-lg flex items-center justify-center hover:scale-105 transition-transform animate-bounce"
                style={{ animationIterationCount: 3 }}
              >
                <Wand2 size={24} />
              </button>
            )}

            {/* --- 黑色半透明遮罩 --- */}
            <div 
              className={`absolute inset-0 bg-black/40 backdrop-blur-[2px] transition-opacity duration-300 z-10 ${
                uiState === 'trigger' || uiState === 'mindmap' ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'
              }`}
              onClick={() => setUiState('initial')}
            ></div>

            {/* --- 状态一：触发态（AI 面板） --- */}
            <div 
              className={`absolute bottom-0 left-0 right-0 bg-white rounded-t-[24px] z-20 transition-transform duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] flex flex-col ${
                uiState === 'trigger' ? 'translate-y-0 h-[85%]' : 'translate-y-full h-[85%]'
              }`}
            >
              {/* 顶部把手与标题 */}
              <div className="flex justify-between items-center p-5 border-b border-gray-100" onClick={() => setUiState('initial')}>
                <div className="w-6"></div>
                <h3 className="text-base font-medium">AI文档助手</h3>
                <ChevronDown className="text-gray-400 cursor-pointer" />
              </div>

              {/* 面板内容 */}
              <div className="p-6 flex-1 overflow-y-auto">
                <h2 className="text-2xl font-bold mb-2">Hi，有什么可以帮你？</h2>
                <p className="text-gray-500 text-sm mb-6">你似乎在阅读《文化产业发展洞察报告》，我可以帮你：</p>

                <div className="space-y-3">
                  <button className="w-full text-left p-4 bg-gray-50 rounded-xl text-[15px] text-gray-700 hover:bg-gray-100 transition-colors">
                    根据文章内容提供3个关键洞察
                  </button>
                  <button className="w-full text-left p-4 bg-gray-50 rounded-xl text-[15px] text-gray-700 hover:bg-gray-100 transition-colors">
                    优化段落的结构和排版
                  </button>
                  <button className="w-full text-left p-4 bg-gray-50 rounded-xl text-[15px] text-gray-700 hover:bg-gray-100 transition-colors">
                    加粗所有带人名的单元格
                  </button>
                </div>
              </div>

              {/* 底部输入区 */}
              <div className="p-4 bg-white border-t border-gray-100 pb-8">
                <div className="flex gap-3 mb-4">
                  {/* 核心入口修改：底部功能按钮 */}
                  <button 
                    onClick={() => setUiState('mindmap')}
                    className="flex items-center gap-1.5 px-4 py-2 bg-blue-50 border border-blue-100 rounded-full text-sm text-blue-600 shadow-sm hover:bg-blue-100 transition-colors font-medium"
                  >
                    <Network size={14} /> 转换格式
                  </button>
                  <button className="flex items-center gap-1.5 px-4 py-2 bg-white border border-gray-200 rounded-full text-sm text-gray-600 shadow-sm hover:bg-gray-50 transition-colors">
                    <Search size={14} /> 其它功能
                  </button>
                </div>
                <div className="flex items-center justify-between p-3 bg-gray-50 rounded-2xl border border-gray-200">
                  <List className="text-gray-400 ml-2" size={20} />
                  <span className="text-gray-600 font-medium">按住 说话</span>
                  <PlusCircle className="text-gray-400 mr-2" size={20} />
                </div>
              </div>
            </div>


            {/* --- 状态二：半屏脑图生成态 --- */}
            <div 
              className={`absolute bottom-0 left-0 right-0 bg-white rounded-t-[24px] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-30 transition-transform duration-[600ms] ease-[cubic-bezier(0.25,1,0.5,1)] flex flex-col ${
                uiState === 'mindmap' ? 'translate-y-0 h-[60%]' : 'translate-y-full h-[60%]'
              }`}
            >
              {/* 物理阻尼把手 */}
              <div className="w-full flex justify-center pt-3 pb-2 cursor-grab active:cursor-grabbing" onClick={() => setUiState('initial')}>
                <div className="w-12 h-1.5 bg-gray-300 rounded-full"></div>
              </div>
              
              <div className="px-5 pb-3 flex justify-between items-center border-b border-gray-100">
                <div className="flex flex-col">
                  <h3 className="font-semibold text-gray-800 flex items-center gap-2">
                    <Network size={18} className="text-blue-500" />
                    文档思维导图
                  </h3>
                </div>
                {/* 修改：将保存图片移至 Header 区域，采用更轻量的按钮样式 */}
                <button className="flex items-center gap-1.5 px-3 py-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-lg text-[13px] font-medium text-gray-600 transition-colors active:scale-95">
                  <Download size={14} className="text-gray-500" />
                  存为图片
                </button>
              </div>

              {/* 脑图树状结构 - 视觉升级版 */}
              <div className="p-5 overflow-y-auto flex-1 bg-slate-50">
                {/* Root Node */}
                <div className="relative z-10 flex flex-col items-start">
                  <div className="flex items-center gap-2 px-4 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl shadow-md font-medium text-[15px] hover:shadow-lg transition-shadow">
                    <Lightbulb size={18} className="text-blue-100" />
                    核心论点：文化与科技深度融合
                  </div>

                  {/* Children Container */}
                  <div className="relative mt-2 ml-6 pb-4">
                    {/* Main Vertical Trunk */}
                    <div className="absolute left-0 top-0 bottom-4 w-0.5 bg-gray-200"></div>

                    {/* Node 1 */}
                    <div className="relative pl-8 pt-4">
                      {/* Elbow connector */}
                      <div className="absolute left-0 top-0 w-8 h-8 border-l-2 border-b-2 border-gray-200 rounded-bl-xl"></div>
                      <div className="relative flex items-center gap-2 px-3 py-2 bg-white border border-gray-200 rounded-lg shadow-sm text-[14px] text-gray-700 z-10">
                        <Layers size={15} className="text-gray-400" />
                        产业驱动力转型
                      </div>
                    </div>

                    {/* Node 2 (Parent of target) */}
                    <div className="relative pl-8 pt-4">
                       {/* Elbow connector */}
                      <div className="absolute left-0 top-0 w-8 h-8 border-l-2 border-b-2 border-gray-200 rounded-bl-xl"></div>
                      <div className="relative flex items-center gap-2 px-3 py-2 bg-white border-l-4 border-l-purple-500 border-y border-r border-gray-200 rounded-lg shadow-sm text-[14px] font-medium text-gray-800 z-10">
                        <Sparkles size={15} className="text-purple-500" />
                        文化创意转化
                      </div>

                      {/* Grandchildren Container */}
                      <div className="relative mt-2 ml-4 pb-2">
                         <div className="absolute left-0 top-0 bottom-2 w-0.5 bg-gray-200"></div>

                         {/* Grandchild 1 */}
                         <div className="relative pl-8 pt-3">
                            <div className="absolute left-0 top-0 w-8 h-7 border-l-2 border-b-2 border-gray-200 rounded-bl-xl"></div>
                            <div className="relative flex items-center gap-2 px-3 py-1.5 bg-white border border-gray-100 rounded-md text-[13px] text-gray-600 z-10">
                              <span className="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
                              跨界人才参与
                            </div>
                         </div>

                         {/* Grandchild 2 (Target) */}
                         <div className="relative pl-8 pt-3 group cursor-pointer" onClick={() => handleNodeClick('node-3', '核心论点 > 文化创意转化 > 沉浸式技术...')}>
                            {/* Interactive Elbow */}
                            <div className="absolute left-0 top-0 w-8 h-7 border-l-2 border-b-2 border-gray-200 group-hover:border-blue-400 transition-colors rounded-bl-xl"></div>
                            
                            <div className="relative flex items-center gap-2 px-3 py-2 bg-blue-50 border border-blue-200 rounded-lg shadow-sm text-[13px] font-semibold text-blue-700 group-hover:bg-blue-100 group-hover:shadow-md transition-all transform origin-left hover:scale-[1.02] z-10">
                              <Zap size={14} className="text-blue-500 animate-pulse" />
                              👉 沉浸式技术应用 (点击跳转)
                            </div>
                         </div>
                      </div>
                    </div>

                    {/* Node 3 */}
                    <div className="relative pl-8 pt-4">
                      {/* Elbow connector */}
                      <div className="absolute left-0 top-0 w-8 h-8 border-l-2 border-b-2 border-gray-200 rounded-bl-xl"></div>
                      <div className="relative flex items-center gap-2 px-3 py-2 bg-white border border-gray-200 rounded-lg shadow-sm text-[14px] text-gray-700 z-10">
                        <Network size={15} className="text-gray-400" />
                        元宇宙与价值延展
                      </div>
                    </div>

                  </div>
                </div>
              </div>
            </div>

            {/* --- 状态三/四：悬浮面包屑导航 (Breadcrumb Bar) --- */}
            <div 
              onClick={() => setUiState('mindmap')} // 状态四：随时唤起态
              className={`absolute top-12 left-4 right-4 z-40 flex items-center gap-2 pl-4 pr-2 py-2.5 rounded-2xl bg-white/80 backdrop-blur-md shadow-[0_4px_20px_rgba(0,0,0,0.08)] border border-white/50 cursor-pointer transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] ${
                uiState === 'reading' 
                  ? 'translate-y-0 opacity-100 scale-100' // 淡入 + 位移
                  : '-translate-y-6 opacity-0 scale-95 pointer-events-none'
              }`}
            >
              <div className="bg-blue-100 p-1.5 rounded-full">
                <MapPin size={14} className="text-blue-600" />
              </div>
              <p className="text-[13px] font-medium text-gray-700 truncate flex-1">
                {activeNode || "正在定位中..."}
              </p>
              
              <div className="flex items-center gap-1 ml-1">
                <span className="text-xs text-blue-500 font-medium px-1">展开脑图</span>
                <div className="w-px h-3.5 bg-gray-300 mx-1"></div> {/* 分割线 */}
                
                {/* 新增：退出机制 - 退出导图模式 */}
                <button 
                  onClick={(e) => {
                    e.stopPropagation(); // 阻止事件冒泡，防止触发外层div的“展开脑图”
                    setUiState('initial');
                    setHighlightedSection(null);
                    setActiveNode(null);
                  }}
                  className="p-1.5 hover:bg-red-50 rounded-full transition-colors flex items-center justify-center text-gray-400 hover:text-red-500 group"
                  title="退出导图模式"
                >
                  <X size={16} className="group-hover:rotate-90 transition-transform duration-300" />
                </button>
              </div>
            </div>

          </div>

          {/* 右侧提示说明面板 */}
          <div className="ml-12 max-w-md hidden lg:block">
            <h2 className="text-2xl font-bold mb-6 text-gray-800">B3方案 交互规约说明</h2>
            <div className="space-y-6">
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-bold text-gray-800 mb-2 flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-gray-900 text-white flex items-center justify-center text-xs">1</span> 触发态</h3>
                <p className="text-sm text-gray-600">点击右下角浮动按钮唤起 AI 面板。点击底部输入框上方的 <b>"格式转换"</b> 按钮进入脑图态。</p>
              </div>
              
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-bold text-gray-800 mb-2 flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs">2</span> 半屏脑图生成态</h3>
                <p className="text-sm text-gray-600">60% 屏幕高度。文档视觉上被压缩推高（模拟）。点击脑图中的 <b>"👉 沉浸式技术应用"</b> 节点体验核心跳跃。</p>
              </div>

              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-bold text-gray-800 mb-2 flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-green-500 text-white flex items-center justify-center text-xs">3</span> 沉浸阅读态（核心）</h3>
                <p className="text-sm text-gray-600">抽屉迅速收起。文档 <b>Smooth Scroll</b> 精准定位到目标段落，并伴随短暂的 <b>背景高亮闪烁</b>。<br/><br/>顶部优雅 <b>Fade In</b> 毛玻璃面包屑导航。</p>
              </div>

              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-bold text-gray-800 mb-2 flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-purple-500 text-white flex items-center justify-center text-xs">4</span> 随时唤起态</h3>
                <p className="text-sm text-gray-600">防止迷航设计：阅读完毕后，点击顶部的 <b>"面包屑导航条"</b>，即可随时再次拉起抽屉恢复到脑图状态。</p>
              </div>

              <div className="bg-gradient-to-br from-blue-50 to-white p-5 rounded-2xl shadow-sm border border-blue-100 relative overflow-hidden">
                <h3 className="relative z-10 font-bold text-blue-800 mb-3 flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs">5</span> 体验闭环（本次新增）</h3>
                <ul className="relative z-10 text-sm text-gray-700 space-y-3 list-disc pl-4 marker:text-blue-400">
                  <li><b>保存机制：</b>去掉了容易误触的悬浮球，将 <b>"存为图片"</b> 按钮整合进脑图抽屉的右上角 Header 区，界面更清爽。</li>
                  <li><b>退出机制：</b>面包屑最右侧新增 <b>退出按钮 (✖️)</b>，点击后彻底清理高亮和导航栏，恢复无干扰的纯净阅读态。</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<B3Prototype />);
  </script>
</body>
</html>
